services:
  - type: web
    name: api-server
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm run typecheck && pnpm -r --filter "./artifacts/api-server" --if-present run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

  - type: web
    name: frontend
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: serve -s artifacts/balar-ibook/dist/public -l $PORT
    envVars:
      - key: NODE_ENV
        value: production

